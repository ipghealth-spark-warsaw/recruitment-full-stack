version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - '3001:3001'
    volumes:
      - sqlite_data:/app/data
    environment:
      - DB_PATH=/app/data/tasks.db
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001
    networks:
      - app-network

volumes:
  sqlite_data:

networks:
  app-network:
    driver: bridge
